spring:
  application:
    name: vnpt-order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/vnpt_orders
    username: ${DB_USERNAME:vnpt_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    vn.vnpt.order: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
